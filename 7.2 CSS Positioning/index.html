<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    
    .blue-box{
      position: relative;
      height: 300px;
      width: 500px;
      background-color: blue;
      left: 200px;
      top: 200px;
    }
    .red-circle{
      background-color: red;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      position: absolute;
      top: 50%;                  /*blue box height 300px so red circle 150px so so 300=100% and 150=50% that's why used 50% to circle top and left  */
      left: 50%;
    }

  </style>
</head>

<body>
  <div class="blue-box">
    <div class="red-circle">
    </div>
  </div>

</body>

</html>
